<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Rise & Root — Premium Indian Tea</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
:root{
  --gold:#C9A84C;
  --gold-light:#E2C97E;
  --black:#0D0C0A;
  --deep:#141210;
  --muted:#6E6860;
  --white:#FAF8F4;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  background:var(--black);
  color:var(--muted);
  font-family:'Jost',sans-serif;
}

nav{
  position:fixed;
  width:100%;
  padding:20px 60px;
  display:flex;
  justify-content:space-between;
  z-index:10;
  transition:.3s;
}
nav.scrolled{
  background:rgba(0,0,0,0.85);
  backdrop-filter:blur(10px);
}
nav a{
  color:var(--gold);
  text-decoration:none;
  font-size:12px;
  letter-spacing:2px;
}

#hero{
  height:100vh;
  display:grid;
  grid-template-columns:1fr 1fr;
  align-items:center;
  padding:100px 60px 40px;
}

.hero-text h1{
  font-family:'Cormorant Garamond',serif;
  font-size:72px;
  color:var(--white);
}
.hero-text span{
  color:var(--gold-light);
}
.hero-text p{
  margin-top:20px;
}

.hero-btn{
  display:inline-block;
  margin-top:40px;
  padding:16px 40px;
  background:var(--gold);
  color:black;
  text-decoration:none;
}

.hero-img img{
  width:420px;
  max-width:90%;
  animation:float 6s ease-in-out infinite;
}

@keyframes float{
  50%{transform:translateY(-20px)}
}

section{padding:120px 60px}

.section-title{
  font-family:'Cormorant Garamond',serif;
  font-size:48px;
  color:var(--white);
}

#collection{background:var(--deep)}

.grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  margin-top:60px;
}

.card{
  padding:40px;
}

#contact{background:#0f0e0c}

.form{max-width:500px;margin-top:40px}

input,select,textarea{
  width:100%;
  padding:14px;
  margin-bottom:12px;
  background:#1a1815;
  border:1px solid #2a2722;
  color:white;
}

button{
  width:100%;
  padding:14px;
  background:var(--gold);
  border:none;
}

#form-status{
  display:none;
  margin-bottom:12px;
  padding:10px;
  font-size:12px;
}

footer{
  padding:40px;
  text-align:center;
}

@media(max-width:900px){
  #hero{grid-template-columns:1fr;text-align:center}
  .grid{grid-template-columns:1fr}
}
</style>
</head>

<body>

<nav id="nav">
  <div style="color:var(--gold)">Rise & Root</div>
  <a href="#collection">Teas</a>
</nav>

<section id="hero">
  <div class="hero-text">
    <h1>Where every cup finds its <span>roots.</span></h1>
    <p>Premium Indian teas sourced from the finest estates.</p>
    <a href="#collection" class="hero-btn">Explore</a>
  </div>

  <div class="hero-img">
    <img src="./packet.png" alt="Tea Pack"/>
  </div>
</section>

<section id="collection">
  <h2 class="section-title">The Collection</h2>
  <div class="grid">
    <div class="card"><h3>Darjeeling</h3></div>
    <div class="card"><h3>Assam</h3></div>
    <div class="card"><h3>Blend</h3></div>
  </div>
</section>

<section id="contact">
  <h2 class="section-title">Enquire</h2>

  <div class="form">
    <div id="form-status"></div>

    <input id="f-name" placeholder="Your Name"/>
    <input id="f-contact" placeholder="Phone or Email"/>
    <select id="f-enquiry">
      <option>General</option>
      <option>Bulk Order</option>
    </select>
    <textarea id="f-message" placeholder="Message"></textarea>

    <button id="submitBtn" onclick="submitForm()">Send</button>
  </div>
</section>

<footer>© Rise & Root</footer>

<script>
window.addEventListener('scroll',()=>{
  document.getElementById('nav')
    .classList.toggle('scrolled',window.scrollY>50)
});

/* ✅ YOUR SCRIPT URL ADDED */
const SCRIPT_URL="https://script.google.com/macros/s/AKfycbzokr_yQjDO0kX5ZgqAsQn1pHwT8loIs3kEuH0j0p33XFbqf9l8Aw8iuSh4Y_MVQF-B/exec";

async function submitForm(){
  const name=document.getElementById('f-name').value.trim();
  const contact=document.getElementById('f-contact').value.trim();
  const enquiry=document.getElementById('f-enquiry').value;
  const message=document.getElementById('f-message').value.trim();
  const btn=document.getElementById('submitBtn');

  if(!name||!contact){
    showStatus("Please fill required fields","warn");
    return;
  }

  btn.innerText="Sending...";
  btn.disabled=true;

  try{
    const params=new URLSearchParams({name,contact,enquiry,message});
    await fetch(SCRIPT_URL+"?"+params.toString(),{
      method:"GET",
      mode:"no-cors"
    });

    showStatus("Message sent successfully","success");
    btn.innerText="Sent ✓";
  }catch(e){
    showStatus("Error sending message","error");
    btn.innerText="Send";
    btn.disabled=false;
  }
}

function showStatus(msg,type){
  const el=document.getElementById('form-status');
  el.innerText=msg;
  el.style.display='block';

  if(type==='success'){
    el.style.background='rgba(100,140,60,.1)';
    el.style.color='#98C46A';
  }else if(type==='warn'){
    el.style.background='rgba(201,168,76,.1)';
    el.style.color='#E2C97E';
  }else{
    el.style.background='rgba(200,60,60,.1)';
    el.style.color='#ff6b6b';
  }
}
</script>

</body>
</html>
